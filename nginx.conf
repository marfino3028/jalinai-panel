server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: semua route diarahkan ke index.html (history mode vue-router).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache aset ber-hash.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
